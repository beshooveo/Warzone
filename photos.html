<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Photos - War Zone</title><style>:root{--bg:#0f172a;--card:rgba(30,41,59,.82);--muted:#94a3b8;--text:#f8fafc;--blue:#38bdf8;--border:rgba(255,255,255,.12)}*{box-sizing:border-box}body{margin:0;min-height:100vh;padding:28px;font-family:'Segoe UI',Tahoma,sans-serif;background:radial-gradient(circle at top right,rgba(56,189,248,.16),transparent 35%),var(--bg);color:var(--text)}.wrap{max-width:1200px;margin:auto}.title{text-align:center;color:var(--blue)}.sub{text-align:center;color:var(--muted);line-height:1.8}.links{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin:22px 0}.links a{color:var(--blue);text-decoration:none;border:1px solid var(--border);border-radius:999px;padding:9px 14px;background:rgba(15,23,42,.65)}.toolbar{display:flex;gap:12px;margin-bottom:18px;flex-wrap:wrap}.toolbar input{flex:1;min-width:240px;padding:12px;border-radius:12px;border:1px solid var(--border);background:rgba(15,23,42,.68);color:var(--text);font-size:1rem}button{border:0;border-radius:12px;padding:11px 14px;background:linear-gradient(135deg,#0284c7,#0369a1);color:white;font-weight:800;cursor:pointer}.team{background:var(--card);border:1px solid var(--border);border-radius:20px;margin-bottom:18px;overflow:hidden}.team h2{margin:0;padding:16px;color:var(--blue);border-bottom:1px solid var(--border)}.players{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:14px;padding:16px}.player{background:rgba(15,23,42,.64);border:1px solid var(--border);border-radius:16px;padding:14px}.top{display:flex;gap:12px;align-items:center;margin-bottom:12px}.photo,.placeholder{width:70px;height:70px;border-radius:50%;border:2px solid rgba(56,189,248,.35)}.photo{object-fit:cover;background:#1e293b}.placeholder{display:flex;align-items:center;justify-content:center;background:#1e293b;color:var(--blue);font-weight:900}.name{font-weight:900}.team-name{color:var(--muted);font-size:.9rem}input[type=file]{width:100%;margin:8px 0;color:var(--muted)}.status{margin-top:8px;display:none;padding:9px;border-radius:10px}.ok{display:block;background:rgba(52,211,153,.13);color:#bbf7d0}.err{display:block;background:rgba(248,113,113,.13);color:#fecaca}.loading{text-align:center;color:var(--muted);padding:30px}</style></head><body><div class="wrap"><h1 class="title">📸 Photos</h1><p class="sub">تعديل الصورة الشخصية لأي لاعب لوحده بدون تعديل الفريق بالكامل.</p><div class="links"><a href="/admin">لوحة التحكم</a><a href="/registrations">إدارة التسجيلات</a><a href="/backup">Backup</a><a href="/">الرئيسية</a></div><div class="toolbar"><input id="search" placeholder="ابحث باسم لاعب أو فريق..." oninput="renderPhotos()"><button onclick="loadPhotos()">تحديث القائمة</button></div><div id="content" class="loading">جاري تحميل اللاعبين...</div></div><script>let teams=[];function esc(v){return String(v??'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));}function setStatus(id,msg,ok=true){const el=document.getElementById(id);el.className='status '+(ok?'ok':'err');el.textContent=msg;}async function loadPhotos(){const box=document.getElementById('content');box.className='loading';box.textContent='جاري تحميل اللاعبين...';try{const r=await fetch('/api/admin/player-photos',{credentials:'same-origin'});const d=await r.json();if(!r.ok)throw new Error(d.detail||'افتح /admin واعمل تسجيل دخول الأول');teams=d.teams||[];renderPhotos();}catch(e){box.className='status err';box.textContent=e.message;}}function renderPhotos(){const q=(document.getElementById('search').value||'').trim().toLowerCase();const filtered=teams.map(t=>({...t,players:(t.players||[]).filter(p=>!q||(p.name||'').toLowerCase().includes(q)||(t.team_name||'').toLowerCase().includes(q))})).filter(t=>t.players.length);const box=document.getElementById('content');if(!filtered.length){box.className='loading';box.textContent='لا يوجد لاعبين مطابقين.';return;}box.className='';box.innerHTML=filtered.map(t=>`<section class="team"><h2>${esc(t.team_name||'فريق بدون اسم')}</h2><div class="players">${t.players.map(p=>{const sid=('st_'+t.id+'_'+p.id).replace(/[^a-zA-Z0-9_]/g,'_');const fid=('file_'+t.id+'_'+p.id).replace(/[^a-zA-Z0-9_]/g,'_');const img=p.photo_url?`<img class="photo" src="${esc(p.photo_url)}?t=${Date.now()}" alt="">`:`<div class="placeholder">${esc((p.name||'?').slice(0,1))}</div>`;return `<div class="player"><div class="top">${img}<div><div class="name">${esc(p.name||'لاعب')}</div><div class="team-name">${esc(t.team_name||'')}</div></div></div><input id="${fid}" type="file" accept="image/jpeg,image/png,image/webp"><button onclick="savePhoto('${esc(t.id)}','${esc(p.id)}','${fid}','${sid}')">حفظ الصورة</button><div id="${sid}" class="status"></div></div>`}).join('')}</div></section>`).join('');}async function savePhoto(teamId,playerId,fileId,statusId){const file=document.getElementById(fileId).files[0];if(!file){setStatus(statusId,'اختار صورة الأول',false);return;}const fd=new FormData();fd.append('photo',file);setStatus(statusId,'جاري رفع الصورة...',true);try{const r=await fetch(`/api/admin/player-photos/${encodeURIComponent(teamId)}/${encodeURIComponent(playerId)}`,{method:'POST',credentials:'same-origin',body:fd});const d=await r.json().catch(()=>({}));if(!r.ok)throw new Error(d.detail||'فشل رفع الصورة');setStatus(statusId,d.message||'تم تحديث الصورة ✅',true);await loadPhotos();}catch(e){setStatus(statusId,e.message,false);}}loadPhotos();</script></body></html>
