<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><title>Photos</title><style>body{font-family:Tahoma;background:#0f172a;color:white;padding:30px}.card{background:#1e293b;margin:12px;padding:16px;border-radius:14px}a,button{color:white;background:#0284c7;padding:10px 14px;border-radius:10px;border:0}input{margin:10px}</style></head><body><h1>Photos 📸</h1><p><a href="/admin">لوحة التحكم</a> <a href="/">الرئيسية</a></p><input id="q" placeholder="بحث" oninput="render()"><div id="app">تحميل...</div><script>let teams=[];async function load(){let r=await fetch("/api/admin/player-photos",{credentials:"same-origin"});if(!r.ok){app.innerText=await r.text();return}teams=(await r.json()).teams||[];render()}function render(){let q=document.getElementById("q").value.toLowerCase();app.innerHTML=teams.map(t=>`<div><h2>${t.team_name}</h2>${t.players.filter(p=>!q||p.name.toLowerCase().includes(q)||t.team_name.toLowerCase().includes(q)).map(p=>`<div class="card">${p.photo_url?`<img src="${p.photo_url}?t=${Date.now()}" style="width:70px;height:70px;border-radius:50%;object-fit:cover">`:""}<b>${p.name}</b><br><input type="file" id="f_${p.id}"><button onclick="save(\`${t.id}\`,\`${p.id}\`)">حفظ الصورة</button><span id="s_${p.id}"></span></div>`).join("")}</div>`).join("")}async function save(t,p){let f=document.getElementById("f_"+p).files[0];if(!f)return alert("اختار صورة");let fd=new FormData();fd.append("photo",f);let r=await fetch(`/api/admin/player-photos/${t}/${p}`,{method:"POST",credentials:"same-origin",body:fd});document.getElementById("s_"+p).innerText=r.ok?" تم ✅":" فشل: "+await r.text();if(r.ok)setTimeout(load,500)}</script></body></html>
