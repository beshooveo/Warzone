<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Photos - War Zone</title>
<style>
:root{--bg:#0f172a;--card:rgba(30,41,59,.82);--card2:rgba(15,23,42,.68);--muted:#94a3b8;--text:#f8fafc;--blue:#38bdf8;--border:rgba(255,255,255,.12);--red:#f87171;--green:#34d399}*{box-sizing:border-box}body{margin:0;min-height:100vh;padding:30px;font-family:'Segoe UI',Tahoma,sans-serif;background:radial-gradient(circle at top right,rgba(56,189,248,.16),transparent 35%),var(--bg);color:var(--text)}.wrap{max-width:1250px;margin:auto}.title{text-align:center;color:var(--blue);font-size:3rem;margin:20px 0 8px}.sub{text-align:center;color:var(--muted);line-height:1.8;margin-bottom:22px}.links{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:26px}.links a{color:var(--blue);text-decoration:none;border:1px solid var(--border);border-radius:999px;padding:10px 16px;background:var(--card2);font-weight:700}.toolbar{display:flex;gap:12px;align-items:center;margin-bottom:18px}.toolbar input{flex:1;min-width:220px;padding:13px;border-radius:14px;border:1px solid var(--border);background:var(--card2);color:var(--text);font-size:1rem}.toolbar button,.save{border:0;border-radius:14px;padding:13px 18px;background:linear-gradient(135deg,#0284c7,#0369a1);color:white;font-weight:800;cursor:pointer}.team{background:var(--card);border:1px solid var(--border);border-radius:22px;margin-bottom:20px;overflow:hidden;box-shadow:0 18px 35px rgba(0,0,0,.22)}.team h2{margin:0;padding:18px 20px;color:var(--blue);font-size:1.6rem;border-bottom:1px solid var(--border)}.players{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:14px;padding:16px}.player{background:rgba(15,23,42,.64);border:1px solid var(--border);border-radius:18px;padding:14px}.top{display:flex;gap:12px;align-items:center;margin-bottom:12px}.photo,.placeholder{width:74px;height:74px;border-radius:50%;border:3px solid rgba(56,189,248,.35);flex:0 0 auto}.photo{object-fit:cover;background:#1e293b}.placeholder{display:flex;align-items:center;justify-content:center;background:#1e293b;color:var(--blue);font-weight:900;font-size:1.3rem}.name{font-weight:900;font-size:1.05rem}.team-name{color:var(--muted);font-size:.9rem;margin-top:4px}input[type=file]{width:100%;margin:8px 0;color:var(--muted)}.status{margin-top:8px;display:none;padding:10px;border-radius:12px;line-height:1.5}.ok{display:block;background:rgba(52,211,153,.13);color:#bbf7d0;border:1px solid rgba(52,211,153,.25)}.err{display:block;background:rgba(248,113,113,.13);color:#fecaca;border:1px solid rgba(248,113,113,.25)}.loading{text-align:center;color:var(--muted);padding:30px;background:var(--card);border:1px solid var(--border);border-radius:18px}@media(max-width:650px){body{padding:16px}.toolbar{flex-direction:column}.toolbar input,.toolbar button{width:100%}.title{font-size:2.2rem}}
</style>
</head>
<body>
<div class="wrap">
  <h1 class="title">📸 Photos</h1>
  <p class="sub">تعديل الصورة الشخصية لأي لاعب لوحده بدون تعديل الفريق بالكامل.</p>
  <div class="links"><a href="/admin">لوحة التحكم</a><a href="/registrations">إدارة التسجيلات</a><a href="/backup">Backup</a><a href="/">الرئيسية</a></div>
  <div class="toolbar"><input id="search" placeholder="ابحث باسم لاعب أو فريق..." oninput="renderPhotos()"><button onclick="loadPhotos()">تحديث القائمة</button></div>
  <div id="content" class="loading">جاري تحميل اللاعبين...</div>
</div>
<script>
let teams=[];
function esc(v){return String(v??'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));}
async function readErr(r){const txt=await r.text();try{const j=JSON.parse(txt);return j.detail||j.message||txt}catch(e){return txt||r.statusText}}
function setStatus(id,msg,ok=true){const el=document.getElementById(id);el.className='status '+(ok?'ok':'err');el.textContent=msg;}
async function loadPhotos(){const box=document.getElementById('content');box.className='loading';box.textContent='جاري تحميل اللاعبين...';try{const r=await fetch('/api/admin/player-photos',{credentials:'same-origin'});if(!r.ok)throw new Error(await readErr(r));teams=(await r.json()).teams||[];renderPhotos();}catch(e){box.className='status err';box.textContent=e.message+' — لو لسه عامل Login افتح /admin واعمل Login تاني.';}}
function renderPhotos(){const q=(document.getElementById('search').value||'').trim().toLowerCase();const filtered=teams.map(t=>({...t,players:(t.players||[]).filter(p=>!q||(p.name||'').toLowerCase().includes(q)||(t.team_name||'').toLowerCase().includes(q))})).filter(t=>t.players.length);const box=document.getElementById('content');if(!filtered.length){box.className='loading';box.textContent='لا يوجد لاعبين مطابقين.';return;}box.className='';box.innerHTML=filtered.map(t=>`<section class="team"><h2>${esc(t.team_name||'فريق بدون اسم')}</h2><div class="players">${t.players.map(p=>{const sid=('st_'+t.id+'_'+p.id).replace(/[^a-zA-Z0-9_]/g,'_');const fid=('file_'+t.id+'_'+p.id).replace(/[^a-zA-Z0-9_]/g,'_');const img=p.photo_url?`<img class="photo" src="${esc(p.photo_url)}?t=${Date.now()}" alt="">`:`<div class="placeholder">${esc((p.name||'?').slice(0,1))}</div>`;return `<div class="player"><div class="top">${img}<div><div class="name">${esc(p.name||'لاعب')}</div><div class="team-name">${esc(t.team_name||'')}</div></div></div><input id="${fid}" type="file" accept="image/jpeg,image/png,image/webp"><button class="save" onclick="savePhoto('${esc(t.id)}','${esc(p.id)}','${fid}','${sid}')">حفظ الصورة</button><div id="${sid}" class="status"></div></div>`}).join('')}</div></section>`).join('');}
async function savePhoto(teamId,playerId,fileId,statusId){const file=document.getElementById(fileId).files[0];if(!file){setStatus(statusId,'اختار صورة الأول',false);return;}const fd=new FormData();fd.append('photo',file);setStatus(statusId,'جاري رفع الصورة...',true);try{const r=await fetch(`/api/admin/player-photos/${encodeURIComponent(teamId)}/${encodeURIComponent(playerId)}`,{method:'POST',credentials:'same-origin',body:fd});if(!r.ok)throw new Error(await readErr(r));const d=await r.json().catch(()=>({}));setStatus(statusId,d.message||'تم تحديث الصورة ✅',true);setTimeout(loadPhotos,500);}catch(e){setStatus(statusId,'فشل رفع الصورة: '+e.message,false);}}
loadPhotos();
</script>
</body>
</html>
